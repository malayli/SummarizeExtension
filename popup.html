<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Page Summarizer</title>
<link rel="stylesheet" href="popup.css">
</head>

<body>

<div class="container">

<!-- MAIN VIEW -->

<div id="mainView">

<div class="header">
<div class="title">Page Summarizer</div>
<div class="subtitle" id="pageSubtitle">
Summarize the current tab with ChatGPT.
</div>
</div>

<div class="card">

<div class="row">
<div class="label">Provider</div>
<div class="value">
<select id="providerSelect">
<option value="openai">ChatGPT</option>
<option value="anthropic">Claude</option>
<option value="deepseek">DeepSeek</option>
</select>
</div>
</div>

<div class="row">
<div class="label">Language</div>
<div class="value">
<select id="languageSelect">
<option value="en">English</option>
<option value="fr">Français</option>
<option value="ja">日本語</option>
</select>
</div>
</div>

<div class="row">
<div class="label">Current page</div>
<div class="value" id="currentPage">—</div>
</div>

<div class="row">
<div class="label">Time zone</div>
<div class="value" id="timezone">—</div>
</div>

<div class="actions">
<button id="summarizeBtn" class="primary" disabled>Summarize</button>
<button id="settingsButton" class="ghost">Settings</button>
</div>

<div class="hint" id="hintText">
Tip: set your API key in Settings first.
</div>

</div>

<div class="section">

<div class="sectionHeader">
<div class="sectionTitle">Summary</div>
<button id="copyBtn" class="link" disabled>Copy</button>
</div>

<div id="statusText" class="empty">
Click “Summarize” to generate a summary.
</div>

<pre id="summaryText" class="summary" style="display:none;"></pre>

</div>

</div>


<!-- SETTINGS VIEW -->

<div id="settingsSection" style="display:none;">

<div class="sectionHeader">
<button id="backButton" class="link">← Back</button>
<div class="sectionTitle">API Settings</div>
</div>

<div class="card">

<label>Provider</label>
<select id="settingsProvider">
<option value="openai">ChatGPT</option>
<option value="anthropic">Claude</option>
<option value="deepseek">DeepSeek</option>
</select>

<label>API Key</label>
<input id="apiKeyInput" type="password" placeholder="Enter API key">

<div class="actions">
<button id="saveKeysButton" class="primary">Save</button>
</div>

<div id="saveStatus" class="hint"></div>

</div>

</div>

</div>

<script type="module" src="settings.js"></script>
<script type="module" src="popup.js"></script>

</body>
</html>
